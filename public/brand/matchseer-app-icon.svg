    />
    <path
      fill="#F8FAFC"
      d="M394 118c0-14-16-22-27-14l-111 85v55l56 43v58c0 15 18 24 30 14l40-31c8-6 12-15 12-25V118Z"
    />
    <path
      fill="#0B132B"
      d="M202 276c0-8 4-15 10-20l44-33 44 33c6 5 10 12 10 20v43c0 24-20 44-44 44h-20c-24 0-44-20-44-44v-43Z"
    />
    <circle cx="256" cy="297" r="31" fill="url(#eye)"/>
    <path
