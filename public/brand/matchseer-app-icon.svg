<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">MatchSeer app icon</title>
  <desc id="desc">A deep navy rounded app icon with the MatchSeer M, seer eye, and signal arcs.</desc>
  <defs>
    <linearGradient id="badge" x1="72" x2="440" y1="40" y2="472" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B132B"/>
      <stop offset="1" stop-color="#071225"/>
    </linearGradient>
    <linearGradient id="badgeEdge" x1="88" x2="424" y1="72" y2="450" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00BFA5"/>
      <stop offset="0.45" stop-color="#1E3A8A"/>
      <stop offset="1" stop-color="#FF6A00"/>
    </linearGradient>
    <linearGradient id="signal" x1="128" x2="384" y1="328" y2="440" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1E3A8A"/>
      <stop offset="1" stop-color="#1155D9"/>
    </linearGradient>
    <linearGradient id="eye" x1="214" x2="298" y1="218" y2="302" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF7A1A"/>
      <stop offset="1" stop-color="#FF4C00"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity=".3"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="104" fill="url(#badge)"/>
  <rect x="24" y="24" width="464" height="464" rx="88" fill="none" stroke="url(#badgeEdge)" stroke-opacity=".22" stroke-width="6"/>
  <g filter="url(#softShadow)">
    <path
