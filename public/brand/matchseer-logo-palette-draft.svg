<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="980" viewBox="0 0 1400 980" role="img" aria-labelledby="title desc">
  <title id="title">MatchSeer logo palette draft</title>
  <desc id="desc">A MatchSeer logo draft using a simplified seer eye, football signal arcs, and a dark navy, gold, orange, stone-blue palette.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f3ea"/>
      <stop offset="0.55" stop-color="#eef1f4"/>
      <stop offset="1" stop-color="#dfe5ee"/>
    </linearGradient>
    <linearGradient id="markDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f376b"/>
      <stop offset="0.46" stop-color="#0d1426"/>
      <stop offset="1" stop-color="#070a11"/>
    </linearGradient>
    <linearGradient id="goldSpark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7c51d"/>
      <stop offset="1" stop-color="#ff6a3d"/>
    </linearGradient>
    <linearGradient id="badgeBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1426"/>
      <stop offset="0.7" stop-color="#07111f"/>
      <stop offset="1" stop-color="#070a11"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0d1426" flood-opacity="0.22"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#f7c51d" flood-opacity="0.34"/>
    </filter>
    <style>
      .label { fill: #717784; font: 700 18px Arial, sans-serif; letter-spacing: 10px; }
      .smallLabel { fill: #717784; font: 700 13px Arial, sans-serif; letter-spacing: 5px; }
      .wordMatch { fill: #1f2328; font: 900 96px Arial, sans-serif; letter-spacing: -4px; }
      .wordSeer { fill: #0d1426; font: 900 96px Arial, sans-serif; letter-spacing: -4px; }
      .tag { fill: #717784; font: 800 20px Arial, sans-serif; letter-spacing: 4px; }
      .caption { fill: #465062; font: 700 18px Arial, sans-serif; }
      .body { fill: #465062; font: 500 17px Arial, sans-serif; }
      .swatchText { fill: #717784; font: 700 16px Arial, sans-serif; letter-spacing: 4px; }
      .hex { fill: #1f2328; font: 700 17px Arial, sans-serif; }
    </style>
    <symbol id="seerIcon" viewBox="0 0 300 300">
      <path d="M56 49 C56 40 66 35 73 41 L150 98 L227 41 C234 35 244 40 244 49 L244 187 C244 196 234 201 227 195 L166 150 L166 194 C166 204 160 213 151 217 C141 213 134 204 134 194 L134 150 L73 195 C66 201 56 196 56 187 Z" fill="url(#markDark)"/>
      <path d="M112 148 L150 121 L188 148 L188 191 C188 206 176 218 161 218 L139 218 C124 218 112 206 112 191 Z" fill="#f7f3ea"/>
      <circle cx="150" cy="175" r="27" fill="url(#goldSpark)" filter="url(#glow)"/>
      <path d="M113 228 C130 246 170 246 187 228" fill="none" stroke="#8fa0bd" stroke-width="18" stroke-linecap="round"/>
      <path d="M91 251 C119 280 181 280 209 251" fill="none" stroke="#8fa0bd" stroke-width="18" stroke-linecap="round" opacity="0.92"/>
      <path d="M123 246 C139 256 161 256 177 246" fill="none" stroke="#f7c51d" stroke-width="7" stroke-linecap="round" opacity="0.9"/>
    </symbol>
    <symbol id="seerIconMono" viewBox="0 0 300 300">
      <path d="M56 49 C56 40 66 35 73 41 L150 98 L227 41 C234 35 244 40 244 49 L244 187 C244 196 234 201 227 195 L166 150 L166 194 C166 204 160 213 151 217 C141 213 134 204 134 194 L134 150 L73 195 C66 201 56 196 56 187 Z" fill="#0d1426"/>
      <path d="M112 148 L150 121 L188 148 L188 191 C188 206 176 218 161 218 L139 218 C124 218 112 206 112 191 Z" fill="#f7f3ea"/>
      <circle cx="150" cy="175" r="27" fill="#0d1426"/>
      <path d="M113 228 C130 246 170 246 187 228" fill="none" stroke="#0d1426" stroke-width="18" stroke-linecap="round"/>
      <path d="M91 251 C119 280 181 280 209 251" fill="none" stroke="#0d1426" stroke-width="18" stroke-linecap="round"/>
    </symbol>
  </defs>

  <rect width="1400" height="980" rx="48" fill="url(#bg)"/>
  <circle cx="178" cy="146" r="220" fill="#f7c51d" opacity="0.08"/>
  <circle cx="1210" cy="794" r="260" fill="#1f376b" opacity="0.08"/>

  <text x="700" y="84" text-anchor="middle" class="label">PRIMARY ICON</text>
  <g transform="translate(535 102)" filter="url(#softShadow)">
    <use href="#seerIcon" width="330" height="330"/>
  </g>

  <line x1="94" y1="438" x2="438" y2="438" stroke="#d1d5db" stroke-width="3"/>
  <line x1="962" y1="438" x2="1306" y2="438" stroke="#d1d5db" stroke-width="3"/>
  <text x="700" y="452" text-anchor="middle" class="label">HORIZONTAL WORDMARK</text>

  <g transform="translate(116 496)" filter="url(#softShadow)">
    <use href="#seerIcon" width="190" height="190"/>
  </g>
  <text x="356" y="624" class="wordMatch">Match</text>
  <text x="735" y="624" class="wordSeer">Seer</text>
  <text x="524" y="682" class="tag">REAL READS. NO ODDS.</text>
  <path d="M476 670 H508" stroke="#f7c51d" stroke-width="6" stroke-linecap="round"/>
  <path d="M894 670 H926" stroke="#ff6a3d" stroke-width="6" stroke-linecap="round"/>

  <line x1="94" y1="742" x2="438" y2="742" stroke="#d1d5db" stroke-width="3"/>
  <line x1="962" y1="742" x2="1306" y2="742" stroke="#d1d5db" stroke-width="3"/>
  <text x="700" y="756" text-anchor="middle" class="label">FAVICON / APP BADGE</text>

  <g transform="translate(590 788)" filter="url(#softShadow)">
    <rect x="0" y="0" width="220" height="220" rx="52" fill="url(#badgeBg)"/>
    <rect x="8" y="8" width="204" height="204" rx="45" fill="none" stroke="#f7c51d" stroke-opacity="0.38" stroke-width="3"/>
    <use href="#seerIcon" x="12" y="10" width="196" height="196"/>
  </g>

  <g transform="translate(118 804)">
    <text x="0" y="0" class="smallLabel">SIMPLIFIED MARKS</text>
    <g transform="translate(0 48)">
      <use href="#seerIcon" width="105" height="105"/>
      <use href="#seerIconMono" x="135" width="105" height="105"/>
      <g transform="translate(276 0)">
        <circle cx="52" cy="52" r="50" fill="#0d1426"/>
        <circle cx="52" cy="52" r="15" fill="#f7c51d"/>
        <path d="M23 75 C38 91 66 91 81 75" fill="none" stroke="#8fa0bd" stroke-width="9" stroke-linecap="round"/>
      </g>
    </g>
  </g>

  <g transform="translate(894 814)">
    <text x="0" y="0" class="smallLabel">COLOR PALETTE</text>
    <g transform="translate(0 42)">
      <rect x="0" y="0" width="92" height="62" rx="8" fill="#070a11"/>
      <rect x="110" y="0" width="92" height="62" rx="8" fill="#0d1426"/>
      <rect x="220" y="0" width="92" height="62" rx="8" fill="#1f376b"/>
      <rect x="330" y="0" width="92" height="62" rx="8" fill="#f7c51d"/>
      <rect x="440" y="0" width="92" height="62" rx="8" fill="#ff6a3d"/>
      <rect x="550" y="0" width="92" height="62" rx="8" fill="#8fa0bd"/>
      <text x="0" y="96" class="swatchText">NAVY BLACK</text>
      <text x="0" y="122" class="hex">#070A11</text>
      <text x="220" y="96" class="swatchText">DEEP FIELD</text>
      <text x="220" y="122" class="hex">#1F376B</text>
      <text x="440" y="96" class="swatchText">ORANGE SPARK</text>
      <text x="440" y="122" class="hex">#FF6A3D</text>
    </g>
  </g>

  <g transform="translate(94 892)">
    <text class="caption" x="0" y="0">Direction</text>
    <text class="body" x="0" y="34">Simpler mark, memorable eye, circular app badge, safer no-odds positioning.</text>
  </g>
</svg>
